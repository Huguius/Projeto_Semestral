<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Biblioteca Pessoal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4">📚 Criar Conta</h2>

                    <!-- Mensagens de erro -->
                    <div th:if="${erro}" class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-triangle"></i> <span th:text="${erro}"></span>
                    </div>
                    <div th:if="${erros}" class="alert alert-danger" role="alert">
                        <ul class="mb-0">
                            <li th:each="e : ${erros}" th:text="${e}"></li>
                        </ul>
                    </div>

                    <form th:action="@{/register}" th:object="${userDTO}" method="post">

                        <!-- Dados pessoais -->
                        <h6 class="text-muted mb-3"><i class="bi bi-person"></i> Dados Pessoais</h6>

                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome *</label>
                            <input type="text" class="form-control" id="nome" th:field="*{nome}"
                                   placeholder="Seu nome completo" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}"
                                   placeholder="seu@email.com" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="senha" class="form-label">Senha *</label>
                                <input type="password" class="form-control" id="senha" th:field="*{senha}"
                                       placeholder="Mínimo 8 caracteres" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="confirmacaoSenha" class="form-label">Confirmar Senha *</label>
                                <input type="password" class="form-control" id="confirmacaoSenha"
                                       th:field="*{confirmacaoSenha}" placeholder="Repita a senha" required>
                            </div>
                        </div>

                        <hr>

                        <!-- Endereço (RF-10) -->
                        <h6 class="text-muted mb-3"><i class="bi bi-geo-alt"></i> Endereço</h6>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="cep" class="form-label">CEP</label>
                                <input type="text" class="form-control" id="cep" th:field="*{cep}"
                                       placeholder="00000-000" maxlength="9">
                                <small class="text-muted">Digite o CEP para preenchimento automático</small>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label for="logradouro" class="form-label">Logradouro</label>
                                <input type="text" class="form-control" id="logradouro" th:field="*{logradouro}"
                                       placeholder="Rua, Avenida...">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="numero" class="form-label">Número</label>
                                <input type="text" class="form-control" id="numero" th:field="*{numero}"
                                       placeholder="123">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="bairro" class="form-label">Bairro</label>
                                <input type="text" class="form-control" id="bairro" th:field="*{bairro}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="cidade" class="form-label">Cidade</label>
                                <input type="text" class="form-control" id="cidade" th:field="*{cidade}">
                            </div>
                            <div class="col-md-2 mb-3">
                                <label for="uf" class="form-label">UF</label>
                                <input type="text" class="form-control" id="uf" th:field="*{uf}" maxlength="2">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="complemento" class="form-label">Complemento</label>
                            <input type="text" class="form-control" id="complemento" th:field="*{complemento}"
                                   placeholder="Apto, Bloco...">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-person-plus"></i> Cadastrar
                        </button>
                    </form>

                    <p class="text-center mb-0">
                        Já tem conta?
                        <a th:href="@{/login}">Faça login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
