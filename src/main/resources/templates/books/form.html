<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${bookId != null} ? 'Editar Livro' : 'Novo Livro'">Livro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/books}">📚 Biblioteca Pessoal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/books}"><i class="bi bi-book"></i> Meus Livros</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/books/new}"><i class="bi bi-plus-circle"></i> Novo Livro</a></li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Sair</button>
            </form>
        </div>
    </div>
</nav>
<main class="container mt-4">
    <div th:if="${erros}" class="alert alert-danger"><ul class="mb-0"><li th:each="e : ${erros}" th:text="${e}"></li></ul></div>
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h2 class="card-title mb-4" th:text="${bookId != null} ? 'Editar Livro' : 'Novo Livro'"></h2>
                    <form th:action="${bookId != null} ? @{/books/{id}/edit(id=${bookId})} : @{/books}" th:object="${book}" method="post">
                        <div class="mb-3"><label for="titulo" class="form-label">Título *</label><input type="text" class="form-control" id="titulo" th:field="*{titulo}" required></div>
                        <div class="mb-3"><label for="autor" class="form-label">Autor *</label><input type="text" class="form-control" id="autor" th:field="*{autor}" required></div>
                        <div class="mb-3"><label for="isbn" class="form-label">ISBN</label><input type="text" class="form-control" id="isbn" th:field="*{isbn}" placeholder="Opcional"></div>
                        <div class="row">
                            <div class="col-md-6 mb-3"><label for="genero" class="form-label">Gênero</label><input type="text" class="form-control" id="genero" th:field="*{genero}"></div>
                            <div class="col-md-6 mb-3"><label for="anoPublicacao" class="form-label">Ano</label><input type="number" class="form-control" id="anoPublicacao" th:field="*{anoPublicacao}" min="1450"></div>
                        </div>
                        <div class="mb-4"><label for="statusLeitura" class="form-label">Status</label>
                            <select class="form-select" id="statusLeitura" th:field="*{statusLeitura}"><option value="">-- Selecione --</option><option th:each="s : ${statusOptions}" th:value="${s}" th:text="${s.descricao}"></option></select>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary" th:text="${bookId != null} ? 'Salvar' : 'Cadastrar'"></button>
                            <a th:href="@{/books}" class="btn btn-secondary">Voltar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
