<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${book.titulo}">Detalhes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/books}">📚 Biblioteca Pessoal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/books}"><i class="bi bi-book"></i> Meus Livros</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/books/new}"><i class="bi bi-plus-circle"></i> Novo Livro</a></li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Sair</button>
            </form>
        </div>
    </div>
</nav>
<main class="container mt-4">
    <h1 th:text="${book.titulo}">Título</h1>
    <div class="card shadow mt-3">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-3">Autor</dt><dd class="col-sm-9" th:text="${book.autor}"></dd>
                <dt class="col-sm-3">ISBN</dt><dd class="col-sm-9" th:text="${book.isbn ?: 'Não informado'}"></dd>
                <dt class="col-sm-3">Gênero</dt><dd class="col-sm-9" th:text="${book.genero ?: 'Não informado'}"></dd>
                <dt class="col-sm-3">Ano</dt><dd class="col-sm-9" th:text="${book.anoPublicacao ?: 'Não informado'}"></dd>
                <dt class="col-sm-3">Status</dt>
                <dd class="col-sm-9">
                    <span class="badge" th:classappend="${book.statusLeitura.name() == 'QUERO_LER'} ? 'bg-info' : (${book.statusLeitura.name() == 'LENDO'} ? 'bg-warning text-dark' : 'bg-success')" th:text="${book.statusLeitura.descricao}"></span>
                </dd>
                <dt class="col-sm-3">Cadastrado em</dt><dd class="col-sm-9" th:text="${#temporals.format(book.dataCadastro, 'dd/MM/yyyy HH:mm')}"></dd>
                <dt class="col-sm-3">Atualizado em</dt><dd class="col-sm-9" th:text="${#temporals.format(book.dataAtualizacao, 'dd/MM/yyyy HH:mm')}"></dd>
            </dl>
        </div>
    </div>
    <div class="mt-3 d-flex gap-2">
        <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-warning"><i class="bi bi-pencil"></i> Editar</a>
        <form th:action="@{/books/{id}/delete(id=${book.id})}" method="post" class="d-inline" onsubmit="return confirm('Deseja realmente excluir?')">
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Excluir</button>
        </form>
        <a th:href="@{/books}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Voltar</a>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
