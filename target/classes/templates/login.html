<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Biblioteca Pessoal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="col-12 col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-4">📚 Biblioteca Pessoal</h2>
                <h5 class="text-center text-muted mb-4">Faça login para continuar</h5>

                <!-- Mensagens condicionais (RF-02 CA-06) -->
                <div th:if="${param.error}" class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-triangle"></i> Credenciais inválidas
                </div>
                <div th:if="${param.registered}" class="alert alert-success" role="alert">
                    <i class="bi bi-check-circle"></i> Cadastro realizado com sucesso! Faça login.
                </div>
                <div th:if="${param.logout}" class="alert alert-info" role="alert">
                    <i class="bi bi-box-arrow-right"></i> Você saiu com sucesso
                </div>

                <!-- Formulário de login -->
                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="seu@email.com" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="password"
                               placeholder="Sua senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </button>
                </form>

                <p class="text-center mb-0">
                    Não tem conta?
                    <a th:href="@{/register}">Registre-se</a>
                </p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
